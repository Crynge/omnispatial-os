name: Repo Health

on:
  push:
    branches: [main]
  pull_request:

jobs:
  repo-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate public project files
        run: |
          test -f README.md
          test -f LICENSE
          test -f AUTHORS.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f docs/final-audit.md

